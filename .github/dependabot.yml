version: 2
updates:
  # npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "01:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    # Group minor/patch updates; majors stay as individual PRs.
    groups:
      # NestJS platform as one PR
      nestjs:
        patterns:
          - "@nestjs/*"
        update-types:
          - "minor"
          - "patch"
      # Dev toolchain as one PR
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      # Remaining runtime deps as one PR
      production-dependencies:
        dependency-type: "production"
        exclude-patterns:
          - "@nestjs/*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Pin @types/node to the runtime's Node major. A major bump would ship
      # types for APIs that don't exist at runtime. Raise it together with
      # engines + the CI node-version.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # Container base images (Dockerfile)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "01:00"
      timezone: "Europe/Berlin"
    # Group minor/patch updates; majors stay as individual PRs.
    groups:
      container-base-images:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "01:00"
      timezone: "Europe/Berlin"
    # Group minor/patch updates; majors stay as individual PRs.
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
