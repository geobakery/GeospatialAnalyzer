version: 2
updates:
  # npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "01:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    # Group minor/patch updates; majors stay as individual PRs.
    groups:
      # NestJS platform as one PR
      nestjs:
        patterns:
          - "@nestjs/*"
        update-types:
          - "minor"
          - "patch"
      # Dev toolchain as one PR
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      # Remaining runtime deps as one PR
      production-dependencies:
        dependency-type: "production"
        exclude-patterns:
          - "@nestjs/*"
        update-types:
          - "minor"
          - "patch"

  # Docker base image
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "01:00"
      timezone: "Europe/Berlin"
    groups:
      docker:
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "01:00"
      timezone: "Europe/Berlin"
    groups:
      github-actions:
        patterns:
          - "*"
