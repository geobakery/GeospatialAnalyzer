version: '3.5'

services:
  db:
    image: postgis/postgis:15-3.4
    restart: always
    environment:
      - POSTGRES_PASSWORD=geobakery
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
    container_name: postgres
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./sql/extensions.sql:/docker-entrypoint-initdb.d/extensions.sql
      - ./sql/pg_restore.sh:/docker-entrypoint-initdb.d/pg_restore.sh
      - ./sql/data:/docker-entrypoint-initdb.d/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\"" ]

  app:
    build:
      context: .
      dockerfile: Dockerfile-prod
    container_name: nest
    environment:
      - WDS_SOCKET_HOST=127.0.0.1
    ports:
      - '127.0.0.1:3000:3000'
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    #depends_on:
      #db:
        #condition: service_healthy
    #entrypoint: ["/usr/local/bin/wait-for-it.sh", "app:3000", "--", "nginx", "-g", "daemon off;"]

